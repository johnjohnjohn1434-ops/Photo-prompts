<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hansitha Style - Admin Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #f4f4f4;
            font-family: 'Poppins', sans-serif;
            padding: 50px 20px;
        }
        .admin-box {
            max-width: 550px;
            background: #fff;
            margin: 0 auto;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        h2 {
            text-align: center;
            margin-bottom: 30px;
            color: #111;
        }
        .admin-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .admin-form input, .admin-form select, .admin-form textarea {
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 1rem;
            outline: none;
        }
        .admin-form input:focus, .admin-form textarea:focus {
            border-color: #000;
        }
        .file-label {
            font-size: 0.9rem;
            color: #666;
            margin-bottom: -15px;
            font-weight: 500;
        }
        .submit-btn {
            background: #000;
            color: #fff;
            border: none;
            padding: 14px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 500;
            transition: 0.2s;
        }
        .submit-btn:disabled {
            background: #666;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <div class="admin-box">
        <h2>Hansitha Style - Admin Panel</h2>
        <form class="admin-form" id="adminForm">
            <input type="text" id="prodName" placeholder="Style Name (e.g., Casual Style)" required>
            
            <span class="file-label">Select Photo from Local Storage:</span>
            <input type="file" id="prodFile" accept="image/*" required>
            
            <textarea id="prodPrompt" placeholder="Prompt ah inga thanga..." rows="4" required></textarea>
            
            <select id="prodCategory">
                <option value="Women">Women</option>
                <option value="Men">Men</option>
                <option value="Pullingo">Pullingo</option>
            </select>
            
            <button type="submit" id="uploadBtn" class="submit-btn">Upload Style to Website</button>
        </form>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
          apiKey: "AIzaSyBJgk2EzELMAeW0dhw2hyTIxtp6f7Tbo8M",
          authDomain: "thivash-32c14.firebaseapp.com",
          projectId: "thivash-32c14",
          storageBucket: "thivash-32c14.firebasestorage.app",
          messagingSenderId: "842996953973",
          appId: "1:842996953973:web:1ebeebc76aa8a2a4ab993c",
          measurementId: "G-FQCXPWXLZ6"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        function convertToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve(reader.result);
                reader.onerror = error => reject(error);
            });
        }

        document.getElementById('adminForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('prodName').value;
            const fileInput = document.getElementById('prodFile');
            const prompt = document.getElementById('prodPrompt').value;
            const category = document.getElementById('prodCategory').value;
            const uploadBtn = document.getElementById('uploadBtn');

            if (fileInput.files.length === 0) {
                alert("Please select an image file first!");
                return;
            }

            const file = fileInput.files[0];

            // Firestore 1MB limits clear check
            if (file.size > 1048576) { 
                alert("Image perusa iruku bro! Please 1MB kulla compressed photo select pannunga.");
                return;
            }

            uploadBtn.innerText = "Processing & Uploading...";
            uploadBtn.disabled = true;

            try {
                const base64ImageString = await convertToBase64(file);

                await addDoc(collection(db, "styles"), {
                    name,
                    image: base64ImageString,
                    prompt,
                    category,
                    timestamp: new Date()
                });
                
                alert("Style Uploaded Successfully! Chek index.html home page.");
                document.getElementById('adminForm').reset();
            } catch (error) {
                console.error("Error updating database: ", error);
                alert("Upload failed! Database connectivity issue.");
            } finally {
                uploadBtn.innerText = "Upload Style to Website";
                uploadBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
