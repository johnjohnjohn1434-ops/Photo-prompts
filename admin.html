<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hansitha Style - Admin Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body { background-color: #f4f4f4; font-family: 'Poppins', sans-serif; padding: 50px 20px; }
        .admin-box { max-width: 550px; background: #fff; margin: 0 auto; padding: 40px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h2 { text-align: center; margin-bottom: 30px; color: #111; }
        .admin-form { display: flex; flex-direction: column; gap: 20px; }
        .admin-form input, .admin-form select, .admin-form textarea { padding: 12px; border: 1px solid #ccc; border-radius: 4px; font-size: 1rem; outline: none; }
        .file-label { font-size: 0.9rem; color: #666; margin-bottom: -15px; font-weight: 500; }
        .submit-btn { background: #000; color: #fff; border: none; padding: 14px; border-radius: 4px; cursor: pointer; font-size: 1rem; font-weight: 500; }
        .submit-btn:disabled { background: #666; cursor: not-allowed; }
    </style>
</head>
<body>

    <div class="admin-box">
        <h2>Hansitha Style - Admin Panel</h2>
        <form class="admin-form" id="adminForm">
            <input type="text" id="prodName" placeholder="Style Name (e.g., Casual Style)" required>
            
            <span class="file-label">Select Photo (Auto-compress active):</span>
            <input type="file" id="prodFile" accept="image/*" required>
            
            <textarea id="prodPrompt" placeholder="Prompt ah inga thanga..." rows="4" required></textarea>
            
            <select id="prodCategory">
                <option value="Women">Women</option>
                <option value="Men">Men</option>
                <option value="Pullingo">Pullingo</option>
            </select>
            
            <button type="submit" id="uploadBtn" class="submit-btn">Upload Style to Website</button>
        </form>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
          apiKey: "AIzaSyBJgk2EzELMAeW0dhw2hyTIxtp6f7Tbo8M",
          authDomain: "thivash-32c14.firebaseapp.com",
          projectId: "thivash-32c14",
          storageBucket: "thivash-32c14.firebasestorage.app",
          messagingSenderId: "842996953973",
          appId: "1:842996953973:web:1ebeebc76aa8a2a4ab993c",
          measurementId: "G-FQCXPWXLZ6"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Periya image-ah automatic-ah web scale layout-ku compress panra logic
        function compressAndConvertToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const ctx = canvas.getContext('2d');
                        
                        // Width and Height setting for compression (Max 800px width standard)
                        const max_width = 800;
                        const scaleSize = max_width / img.width;
                        
                        if(img.width > max_width) {
                            canvas.width = max_width;
                            canvas.height = img.height * scaleSize;
                        } else {
                            canvas.width = img.width;
                            canvas.height = img.height;
                        }
                        
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                        
                        // 0.6 quality reduction lowers image file size to < 150KB automatically
                        const compressedBase64 = canvas.toDataURL('image/jpeg', 0.6);
                        resolve(compressedBase64);
                    };
                };
                reader.onerror = error => reject(error);
            });
        }

        document.getElementById('adminForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('prodName').value;
            const fileInput = document.getElementById('prodFile');
            const prompt = document.getElementById('prodPrompt').value;
            const category = document.getElementById('prodCategory').value;
            const uploadBtn = document.getElementById('uploadBtn');

            if (fileInput.files.length === 0) {
                alert("Please select an image file!");
                return;
            }

            uploadBtn.innerText = "Compressing & Uploading...";
            uploadBtn.disabled = true;

            try {
                // Generates safe optimized base64 layout code
                const optimizedImage = await compressAndConvertToBase64(fileInput.files[0]);

                await addDoc(collection(db, "styles"), {
                    name,
                    image: optimizedImage,
                    prompt,
                    category,
                    timestamp: new Date()
                });
                
                alert("Style Uploaded Successfully with auto compression!");
                document.getElementById('adminForm').reset();
            } catch (error) {
                console.error("Database connection block: ", error);
                alert("Upload failed! Data structural error or config crash.");
            } finally {
                uploadBtn.innerText = "Upload Style to Website";
                uploadBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
