<!DOCTYPE html>
<html lang="en">
<head>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3847582049366120" crossorigin="anonymous"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hansitha Prompt - AI Photo Prompts</title>
    <meta name="description" content="Hansitha Prompt website for AI photo prompts and creative ideas.">
    <meta name="keywords" content="Hansitha Prompt, Hansitha Style, AI Prompt, Photo Prompt">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,600&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: rgba(22, 28, 45, 0.6);
            --text-color: #f3f4f6;
            --gray-light: rgba(255, 255, 255, 0.05);
            --gray-text: #9ca3af;
            --border-color: rgba(255, 255, 255, 0.08);
            --accent-color: #6366f1;
            --like-color: #ef4444;
            --gradient-accent: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-color); -webkit-font-smoothing: antialiased; background-image: radial-gradient(circle at top right, rgba(99, 102, 241, 0.05), transparent 400px); }
        
        header { padding: 40px 20px 30px 20px; text-align: center; background: rgba(11, 15, 25, 0.8); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border-color); position: sticky; top: 0; z-index: 100; }
        .logo { font-family: 'Playfair Display', serif; font-size: 3.5rem; font-style: italic; letter-spacing: -0.5px; margin-bottom: 25px; background: linear-gradient(to right, #fff, #a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .search-container { max-width: 520px; margin: 0 auto 30px auto; position: relative; }
        .search-container input { 
            width: 100%; 
            padding: 16px 28px; 
            border: 1px solid var(--border-color); 
            border-radius: 50px; 
            font-size: 1rem; 
            outline: none; 
            background: var(--gray-light); 
            color: #fff;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }
        .search-container input::placeholder { color: #6b7280; }
        .search-container input:focus { 
            border-color: var(--accent-color); 
            background: rgba(255,255,255,0.08); 
            transform: scale(1.02);
            box-shadow: 0 0 30px rgba(99, 102, 241, 0.2); 
        }
        
        .categories { display: flex; justify-content: center; gap: 12px; margin-bottom: 10px; flex-wrap: wrap; }
        .cat-btn { background: var(--gray-light); color: var(--text-color); border: 1px solid var(--border-color); padding: 10px 26px; border-radius: 25px; cursor: pointer; font-size: 0.9rem; font-weight: 500; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .cat-btn.active, .cat-btn:hover { background: var(--gradient-accent); color: #fff; border-color: transparent; transform: translateY(-3px); box-shadow: 0 8px 20px rgba(99, 102, 241, 0.3); }
        
        .main-container { max-width: 1100px; margin: 0 auto; padding: 40px 20px; }
        
        .gallery-grid { 
            columns: 2;
            column-gap: 24px;
            width: 100%;
        }
        
        .card { 
            background: var(--card-bg); 
            backdrop-filter: blur(10px);
            border-radius: 24px; 
            overflow: hidden; 
            transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1); 
            box-shadow: 0 10px 30px rgba(0,0,0,0.15); 
            border: 1px solid var(--border-color); 
            display: inline-block;
            width: 100%;
            margin-bottom: 24px;
            position: relative; 
            break-inside: avoid;
        }
        .card:hover { transform: translateY(-8px); border-color: rgba(99, 102, 241, 0.4); box-shadow: 0 20px 40px rgba(0,0,0,0.3); }
        
        .img-container { position: relative; width: 100%; background: #161c2d; display: block; overflow: hidden; border-radius: 24px; }
        .card img { width: 100%; height: auto; display: block; cursor: pointer; transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1); }
        .card:hover img { transform: scale(1.05); }
        
        /* Redesigned Fully UI Like Button */
        .like-btn { 
            position: absolute; 
            top: 18px; 
            right: 18px; 
            z-index: 10; 
            background: rgba(11, 15, 25, 0.7); 
            backdrop-filter: blur(12px); 
            -webkit-backdrop-filter: blur(12px); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            padding: 8px 16px; 
            border-radius: 30px; 
            cursor: pointer; 
            font-size: 0.85rem; 
            font-weight: 600; 
            display: flex; 
            align-items: center; 
            gap: 8px; 
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); 
            color: #fff; 
        }
        .like-btn svg { 
            width: 18px; 
            height: 18px; 
            fill: none; 
            stroke: currentColor; 
            stroke-width: 2.5; 
            transition: transform 0.3s ease, fill 0.3s ease; 
        }
        .like-btn:hover { background: rgba(255, 255, 255, 0.15); transform: scale(1.05); border-color: rgba(255,255,255,0.2); }
        .like-btn.liked { background: rgba(239, 68, 68, 0.15); color: var(--like-color); border-color: rgba(239, 68, 68, 0.3); }
        .like-btn.liked svg { fill: var(--like-color); stroke: var(--like-color); transform: scale(1.1); }
        
        @media(max-width: 600px) {
            .logo { font-size: 2.6rem; }
            .gallery-grid { columns: 2; column-gap: 12px; }
            .card { margin-bottom: 12px; border-radius: 16px; }
            .img-container { border-radius: 16px; }
            .like-btn { top: 10px; right: 10px; padding: 6px 12px; font-size: 0.75rem; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">Hansitha Style</div>
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Style name illa prompt search pannunga...">
        </div>
        <div class="categories">
            <button class="cat-btn active" onclick="filterCategory('All')">Home</button>
            <button class="cat-btn" onclick="filterCategory('Women')">Women</button>
            <button class="cat-btn" onclick="filterCategory('Men')">Men</button>
            <button class="cat-btn" onclick="filterCategory('Pullingo')">Pullingo</button>
        </div>
    </header>

    <main class="main-container">
        <div class="gallery-grid" id="galleryGrid"></div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs, doc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
          apiKey: "AIzaSyBJgk2EzELMAeW0dhw2hyTIxtp6f7Tbo8M",
          authDomain: "thivash-32c14.firebaseapp.com",
          projectId: "thivash-32c14",
          storageBucket: "thivash-32c14.firebasestorage.app",
          messagingSenderId: "842996953973",
          appId: "1:842996953973:web:1ebeebc76aa8a2a4ab993c",
          measurementId: "G-FQCXPWXLZ6"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let allStyles = [];

        async function fetchStyles() {
            const querySnapshot = await getDocs(collection(db, "styles"));
            allStyles = [];
            querySnapshot.forEach((doc) => {
                allStyles.push({ id: doc.id, ...doc.data() });
            });
            renderGallery(allStyles);
        }

        function renderGallery(items) {
            const grid = document.getElementById('galleryGrid');
            grid.innerHTML = '';
            if(items.length === 0) {
                grid.innerHTML = '<p style="text-align:center; grid-column:1/-1; color:var(--gray-text); padding: 40px 0;">No matching items live yet!</p>';
                return;
            }
            items.forEach(item => {
                const likes = item.likes || 0;
                const hasLiked = localStorage.getItem(`liked_${item.id}`) !== null;
                const buttonClass = hasLiked ? 'like-btn liked' : 'like-btn';

                const card = document.createElement('div');
                card.className = 'card';
                
                card.innerHTML = `
                    <div class="img-container">
                        <button class="${buttonClass}" data-id="${item.id}" onclick="likeStyle('${item.id}', this); event.stopPropagation();">
                            <svg viewBox="0 0 24 24">
                                <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
                            </svg>
                            <span class="like-count">${likes}</span>
                        </button>
                        <img src="${item.image}" alt="${item.name}" onclick="navigateToDetail('${item.id}')">
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        window.navigateToDetail = function(id) {
            // Modal open aagathuku pathila detail.html open aagum layout
            window.location.href = `detail.html?id=${id}`;
        }

        window.likeStyle = async function(id, btn) {
            btn.disabled = true;
            const isLiked = localStorage.getItem(`liked_${id}`) !== null;
            try {
                const styleRef = doc(db, "styles", id);
                
                if (isLiked) {
                    await updateDoc(styleRef, { likes: increment(-1) });
                    localStorage.removeItem(`liked_${id}`);
                    updateLikeButtonsUI(id, false, -1);
                } else {
                    await updateDoc(styleRef, { likes: increment(1) });
                    localStorage.setItem(`liked_${id}`, 'true');
                    updateLikeButtonsUI(id, true, 1);
                }
            } catch (err) {
                console.error(err);
            } finally {
                btn.disabled = false;
            }
        }

        function updateLikeButtonsUI(id, isLikedState, valueChange) {
            const targetIdx = allStyles.findIndex(item => item.id === id);
            if(targetIdx !== -1) {
                allStyles[targetIdx].likes = (allStyles[targetIdx].likes || 0) + valueChange;
            }

            const selector = `button[data-id="${id}"]`;
            const buttons = document.querySelectorAll(selector);
            buttons.forEach(button => {
                if(isLikedState) {
                    button.classList.add('liked');
                } else {
                    button.classList.remove('liked');
                }
                const countSpan = button.querySelector('.like-count');
                if(countSpan) {
                    countSpan.innerText = parseInt(countSpan.innerText) + valueChange;
                }
            });
        }

        document.getElementById('searchInput').addEventListener('input', (e) => {
            const searchKey = e.target.value.toLowerCase();
            const filtered = allStyles.filter(item => item.name.toLowerCase().includes(searchKey) || item.prompt.toLowerCase().includes(searchKey));
            renderGallery(filtered);
        });

        window.filterCategory = function(category) {
            document.querySelectorAll('.cat-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            if(category === 'All') { renderGallery(allStyles); } 
            else { renderGallery(allStyles.filter(item => item.category === category)); }
        }

        fetchStyles();
    </script>
</body>
</html>
