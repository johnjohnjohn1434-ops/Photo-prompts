<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hansitha Style</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,600&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #111111;
            --gray-light: #f4f4f4;
            --gray-text: #666666;
            --border-color: #e0e0e0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
        }

        header {
            padding: 30px 20px;
            text-align: center;
            border-bottom: 1px solid var(--border-color);
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 3rem;
            font-style: italic;
            letter-spacing: 2px;
            margin-bottom: 20px;
            color: #000;
        }

        .search-container {
            max-width: 500px;
            margin: 0 auto 20px auto;
            position: relative;
        }

        .search-container input {
            width: 100%;
            padding: 12px 20px;
            border: 1px solid #ccc;
            border-radius: 30px;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s;
        }

        .search-container input:focus {
            border-color: #000;
            box-shadow: 0 0 8px rgba(0,0,0,0.1);
        }

        .categories {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .cat-btn {
            background: none;
            border: 1px solid var(--border-color);
            padding: 8px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: 0.3s;
        }

        .cat-btn:hover, .cat-btn.active {
            background-color: #000;
            color: #fff;
            border-color: #000;
        }

        .main-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }

        .card {
            background: #fff;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            overflow: hidden;
            transition: transform 0.2s;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card img {
            width: 100%;
            height: 300px;
            object-fit: cover;
            cursor: pointer;
        }

        .card-info {
            padding: 15px;
        }

        .card-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .prompt-box {
            background: var(--gray-light);
            padding: 10px;
            font-size: 0.85rem;
            color: var(--gray-text);
            border-radius: 4px;
            margin-bottom: 10px;
            max-height: 60px;
            overflow-y: auto;
            word-break: break-word;
        }

        .copy-btn {
            background: #111;
            color: #fff;
            border: none;
            width: 100%;
            padding: 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.98);
            z-index: 1000;
            overflow-y: auto;
            padding: 40px 20px;
        }

        .modal-close {
            position: fixed;
            top: 20px; right: 30px;
            font-size: 2rem; cursor: pointer; font-weight: bold;
        }

        .modal-content {
            max-width: 900px; margin: 0 auto;
        }

        .modal-main-view {
            display: flex; gap: 30px; flex-wrap: wrap; margin-bottom: 50px;
        }

        .modal-main-img {
            max-width: 450px; width: 100%; height: auto; object-fit: contain; border-radius: 8px;
        }

        .modal-details {
            flex: 1; min-width: 300px;
        }

        .more-images-section {
            border-top: 1px solid var(--border-color);
            padding-top: 30px;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">Hansitha Style</div>
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Style ah search pannunga...">
        </div>
        
        <div class="categories">
            <button class="cat-btn active" onclick="filterCategory('All')">Home</button>
            <button class="cat-btn" onclick="filterCategory('Women')">Women</button>
            <button class="cat-btn" onclick="filterCategory('Men')">Men</button>
            <button class="cat-btn" onclick="filterCategory('Pullingo')">Pullingo</button>
        </div>
    </header>

    <main class="main-container">
        <div class="gallery-grid" id="galleryGrid"></div>
    </main>

    <div class="modal" id="imageModal">
        <span class="modal-close" onclick="closeModal()">&times;</span>
        <div class="modal-content">
            <div class="modal-main-view">
                <img id="modalImg" class="modal-main-img" src="" alt="">
                <div class="modal-details">
                    <h2 id="modalTitle" style="margin-bottom: 15px;"></h2>
                    <p style="font-weight: 500; margin-bottom: 5px;">Prompt:</p>
                    <div class="prompt-box" id="modalPrompt" style="max-height: none; margin-bottom: 15px;"></div>
                    <button class="copy-btn" id="modalCopyBtn">Copy Prompt</button>
                </div>
            </div>
            
            <div class="more-images-section">
                <h3 style="margin-bottom: 20px;">More Images</h3>
                <div class="gallery-grid" id="moreImagesGrid"></div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
          apiKey: "AIzaSyBJgk2EzELMAeW0dhw2hyTIxtp6f7Tbo8M",
          authDomain: "thivash-32c14.firebaseapp.com",
          projectId: "thivash-32c14",
          storageBucket: "thivash-32c14.firebasestorage.app",
          messagingSenderId: "842996953973",
          appId: "1:842996953973:web:1ebeebc76aa8a2a4ab993c",
          measurementId: "G-FQCXPWXLZ6"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let allStyles = [];

        async function fetchStyles() {
            try {
                const querySnapshot = await getDocs(collection(db, "styles"));
                allStyles = [];
                querySnapshot.forEach((doc) => {
                    allStyles.push({ id: doc.id, ...doc.data() });
                });
                renderGallery(allStyles);
            } catch (err) {
                console.error("Error fetching data: ", err);
            }
        }

        function renderGallery(items) {
            const grid = document.getElementById('galleryGrid');
            grid.innerHTML = '';
            
            if(items.length === 0) {
                grid.innerHTML = '<p style="text-align:center; grid-column: 1/-1; padding:40px 0;">No styles found!</p>';
                return;
            }

            items.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <img src="${item.image}" alt="${item.name}" onclick="openModal('${item.id}')">
                    <div class="card-info">
                        <div class="card-title">${item.name}</div>
                        <div class="prompt-box">${item.prompt}</div>
                        <button class="copy-btn" onclick="copyText('${item.prompt.replace(/'/g, "\\'")}')">Copy Prompt</button>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        document.getElementById('searchInput').addEventListener('input', (e) => {
            const searchKey = e.target.value.toLowerCase();
            const filtered = allStyles.filter(item => 
                item.name.toLowerCase().includes(searchKey) || 
                item.prompt.toLowerCase().includes(searchKey)
            );
            renderGallery(filtered);
        });

        window.filterCategory = function(category) {
            document.querySelectorAll('.cat-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            if(category === 'All') {
                renderGallery(allStyles);
            } else {
                const filtered = allStyles.filter(item => item.category === category);
                renderGallery(filtered);
            }
        }

        window.copyText = function(text) {
            navigator.clipboard.writeText(text).then(() => {
                alert("Prompt Copied to Clipboard!");
            });
        }

        window.openModal = function(id) {
            const selected = allStyles.find(item => item.id === id);
            if(!selected) return;

            document.getElementById('modalImg').src = selected.image;
            document.getElementById('modalTitle').innerText = selected.name;
            document.getElementById('modalPrompt').innerText = selected.prompt;
            document.getElementById('modalCopyBtn').onclick = () => copyText(selected.prompt);

            const moreImages = allStyles.filter(item => item.category === selected.category && item.id !== selected.id);
            const moreGrid = document.getElementById('moreImagesGrid');
            moreGrid.innerHTML = '';

            moreImages.slice(0, 4).forEach(item => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <img src="${item.image}" alt="${item.name}" onclick="openModal('${item.id}')">
                    <div class="card-info">
                        <div class="card-title">${item.name}</div>
                    </div>
                `;
                moreGrid.appendChild(card);
            });

            document.getElementById('imageModal').style.display = 'block';
        }

        window.closeModal = function() {
            document.getElementById('imageModal').style.display = 'none';
        }

        fetchStyles();
    </script>
</body>
</html>
