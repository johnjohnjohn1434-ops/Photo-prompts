<!DOCTYPE html>
<html lang="en">
<head>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3847582049366120" crossorigin="anonymous"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hansitha Prompt - AI Photo Prompts</title>
    <meta name="description" content="Hansitha Prompt website for AI photo prompts and creative ideas.">
    <meta name="keywords" content="Hansitha Prompt, Hansitha Style, AI Prompt, Photo Prompt">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,600&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f8fafc;
            --card-bg: rgba(255, 255, 255, 0.75);
            --text-color: #0f172a;
            --gray-light: rgba(15, 23, 42, 0.04);
            --gray-text: #64748b;
            --border-color: rgba(15, 23, 42, 0.08);
            --accent-color: #4f46e5;
            --like-color: #ef4444;
            --gradient-accent: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-color); -webkit-font-smoothing: antialiased; background-image: radial-gradient(circle at top right, rgba(79, 70, 229, 0.04), transparent 400px); }
        
        header { 
            padding: 40px 20px 30px 20px; 
            text-align: center; 
            background: rgba(255, 255, 255, 0.8); 
            backdrop-filter: blur(20px); 
            border-bottom: 1px solid var(--border-color); 
            position: sticky; 
            top: 0; 
            z-index: 100; 
            transition: padding 0.3s ease; 
        }
        
        header.scrolled {
            padding: 15px 20px;
        }
        header.scrolled .logo, 
        header.scrolled .categories {
            display: none;
        }
        header.scrolled .search-container {
            margin-bottom: 0;
        }

        .logo { font-family: 'Playfair Display', serif; font-size: 3.5rem; font-style: italic; letter-spacing: -0.5px; margin-bottom: 25px; background: linear-gradient(to right, #0f172a, #7c3aed); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .search-container { max-width: 520px; margin: 0 auto 30px auto; position: relative; }
        .search-container input { 
            width: 100%; 
            padding: 16px 28px; 
            border: 1px solid var(--border-color); 
            border-radius: 50px; 
            font-size: 1rem; 
            outline: none; 
            background: var(--gray-light); 
            color: var(--text-color);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 15px rgba(0,0,0,0.02);
        }
        .search-container input::placeholder { color: #94a3b8; }
        .search-container input:focus { 
            border-color: var(--accent-color); 
            background: #fff; 
            transform: scale(1.02);
            box-shadow: 0 10px 30px rgba(79, 70, 229, 0.08); 
        }
        
        .categories { display: flex; justify-content: center; gap: 12px; margin-bottom: 10px; flex-wrap: wrap; }
        .cat-btn { background: var(--gray-light); color: var(--text-color); border: 1px solid var(--border-color); padding: 10px 26px; border-radius: 25px; cursor: pointer; font-size: 0.9rem; font-weight: 500; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .cat-btn.active, .cat-btn:hover { background: var(--gradient-accent); color: #fff; border-color: transparent; transform: translateY(-3px); box-shadow: 0 8px 20px rgba(79, 70, 229, 0.2); }
        
        .main-container { max-width: 1100px; margin: 0 auto; padding: 40px 20px; }
        
        .gallery-grid { 
            columns: 2;
            column-gap: 24px;
            width: 100%;
        }
        
        .card { 
            background: var(--card-bg); 
            backdrop-filter: blur(10px);
            border-radius: 24px; 
            overflow: hidden; 
            transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1); 
            box-shadow: 0 10px 30px rgba(0,0,0,0.02); 
            border: 1px solid var(--border-color); 
            display: inline-block;
            width: 100%;
            margin-bottom: 24px;
            position: relative; 
            break-inside: avoid;
        }
        .card:hover { transform: translateY(-8px); border-color: rgba(79, 70, 229, 0.3); box-shadow: 0 20px 40px rgba(15, 23, 42, 0.06); }
        
        .img-container { position: relative; width: 100%; background: #f1f5f9; display: block; overflow: hidden; border-radius: 24px; min-height: 250px; }
        
        .card img { width: 100%; height: auto; display: block; cursor: pointer; transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.4s ease; opacity: 0; position: relative; z-index: 2; }
        .card img.loaded { opacity: 1; }
        .card:hover img { transform: scale(1.05); }

        /* Skeleton Loading Animation */
        @keyframes shimmer {
            0% { background-position: -1000px 0; }
            100% { background-position: 1000px 0; }
        }
        .skeleton {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: #e2e8f0;
            background-image: linear-gradient(90deg, #e2e8f0 0px, #f8fafc 50%, #e2e8f0 100%);
            background-size: 1000px 100%;
            animation: shimmer 2s infinite linear;
            z-index: 1;
        }
        
        .like-btn { 
            position: absolute; 
            top: 18px; 
            right: 18px; 
            z-index: 10; 
            background: rgba(255, 255, 255, 0.85); 
            backdrop-filter: blur(12px); 
            -webkit-backdrop-filter: blur(12px); 
            border: 1px solid rgba(0, 0, 0, 0.05); 
            padding: 8px 16px; 
            border-radius: 30px; 
            cursor: pointer; 
            font-size: 0.85rem; 
            font-weight: 600; 
            display: flex; 
            align-items: center; 
            gap: 8px; 
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            box-shadow: 0 4px 15px rgba(0,0,0,0.04); 
            color: var(--text-color); 
        }
        .like-btn svg { 
            width: 18px; 
            height: 18px; 
            fill: none; 
            stroke: currentColor; 
            stroke-width: 2.5; 
            transition: transform 0.3s ease, fill 0.3s ease; 
        }
        .like-btn:hover { background: #fff; transform: scale(1.05); border-color: rgba(0,0,0,0.1); }
        .like-btn.liked { background: rgba(239, 68, 68, 0.08); color: var(--like-color); border-color: rgba(239, 68, 68, 0.15); }
        .like-btn.liked svg { fill: var(--like-color); stroke: var(--like-color); transform: scale(1.1); }

        .error-state {
            grid-column: 1 / -1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            width: 100%;
            margin: 50px auto;
            padding: 20px;
            background: #fff;
            border-radius: 20px;
            border: 1px solid var(--border-color);
            max-width: 300px;
        }
        
        .error-state h3 {
            font-size: 1.1rem;
            margin-bottom: 5px;
        }
        
        .error-state p {
            font-size: 0.85rem;
            color: var(--gray-text);
            margin-bottom: 0;
        }

        @media(max-width: 600px) {
            .logo { font-size: 2.6rem; }
            .gallery-grid { columns: 2; column-gap: 12px; }
            .card { margin-bottom: 12px; border-radius: 16px; }
            .img-container { border-radius: 16px; min-height: 150px; }
            .like-btn { top: 10px; right: 10px; padding: 6px 12px; font-size: 0.75rem; }
        }
    </style>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4f46e5">
</head>
<body>

    <header id="main-header">
        <div class="logo">Hansitha Style</div>
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Style name illa prompt search pannunga...">
        </div>
        
<button id="installAppBtn" style="display:none;margin:15px auto 0;padding:12px 24px;border:none;border-radius:30px;background:#4f46e5;color:#fff;font-weight:600;cursor:pointer;">⬇ Download App</button>

        <div class="categories">
            <button class="cat-btn active" onclick="filterCategory('All')">Home</button>
            <button class="cat-btn" onclick="filterCategory('Women')">Women</button>
            <button class="cat-btn" onclick="filterCategory('Men')">Men</button>
            <button class="cat-btn" onclick="filterCategory('Pullingo')">Pullingo</button>
        </div>
    </header>

    <main class="main-container">
        <div class="gallery-grid" id="galleryGrid">
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs, doc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // PWA Install Logic
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            const b=document.getElementById('installAppBtn');
            if(b) b.style.display='inline-block';
        });
        window.addEventListener('appinstalled',()=>{
            const b=document.getElementById('installAppBtn');
            if(b) b.style.display='none';
            deferredPrompt=null;
        });

        // Retaining the event listener logic safely in case the app invokes installation elsewhere
        const installBtn = document.getElementById('installAppBtn');
        if (installBtn) {
            installBtn.addEventListener('click', () => {
                if (deferredPrompt) {
                    deferredPrompt.prompt();
                    deferredPrompt.userChoice.then(() => {
                        deferredPrompt = null;
                        installBtn.style.display='none';
                    });
                } else {
                    window.location.href = 'https://johnjohnjohn1434-ops.github.io/Photo-prompts/';
                }
            });
        }

        const firebaseConfig = {
          apiKey: "AIzaSyBJgk2EzELMAeW0dhw2hyTIxtp6f7Tbo8M",
          authDomain: "thivash-32c14.firebaseapp.com",
          projectId: "thivash-32c14",
          storageBucket: "thivash-32c14.firebasestorage.app",
          messagingSenderId: "842996953973",
          appId: "1:842996953973:web:1ebeebc76aa8a2a4ab993c",
          measurementId: "G-FQCXPWXLZ6"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let allStyles = [];

        window.addEventListener('scroll', () => {
            const header = document.getElementById('main-header');
            if (window.scrollY > 50) {
                header.classList.add('scrolled');
            } else {
                header.classList.remove('scrolled');
            }
        });

        function showLoadingState() {
            const grid = document.getElementById('galleryGrid');
            grid.innerHTML = '';
            for(let i=0; i<6; i++) {
                grid.innerHTML += `
                    <div class="card">
                        <div class="img-container">
                            <div class="skeleton"></div>
                        </div>
                    </div>
                `;
            }
        }

        function showNetworkError() {
            const grid = document.getElementById('galleryGrid');
            grid.style.display = 'block'; 
            grid.innerHTML = `
                <div class="error-state" style="margin: 40px auto;">
                    <h3>Network Connection Error</h3>
                    <p>Please check your internet connection</p>
                </div>
            `;
        }

        async function fetchStyles() {
            showLoadingState(); 
            try {
                const querySnapshot = await getDocs(collection(db, "styles"));
                allStyles = [];
                querySnapshot.forEach((doc) => {
                    allStyles.push({ id: doc.id, ...doc.data() });
                });
                if(allStyles.length === 0) {
                    showNetworkError();
                } else {
                    renderGallery(allStyles);
                }
            } catch (error) {
                console.error("Firebase fetch error:", error);
                showNetworkError();
            }
        }

        function renderGallery(items) {
            const grid = document.getElementById('galleryGrid');
            grid.innerHTML = '';
            if(items.length === 0) {
                grid.innerHTML = `
                    <div class="error-state" style="margin: 40px auto;">
                        <h3>Network Connection Error</h3>
                        <p>Please check your internet connection</p>
                    </div>
                `;
                return;
            }
            items.forEach(item => {
                const likes = item.likes || 0;
                const hasLiked = localStorage.getItem(`liked_${item.id}`) !== null;
                const buttonClass = hasLiked ? 'like-btn liked' : 'like-btn';

                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="img-container">
                        <div class="skeleton"></div>
                        <button class="${buttonClass}" data-id="${item.id}" onclick="likeStyle('${item.id}', this); event.stopPropagation();">
                            <svg viewBox="0 0 24 24">
                                <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
                            </svg>
                            <span class="like-count">${likes}</span>
                        </button>
                        <img src="${item.image}" alt="${item.name}" 
                             onload="this.classList.add('loaded'); this.parentElement.querySelector('.skeleton').style.display='none'" 
                             onclick="navigateToDetail('${item.id}')">
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        window.navigateToDetail = function(id) {
            window.location.href = `detail.html?id=${id}`;
        }

        window.likeStyle = async function(id, btn) {
            btn.disabled = true;
            const isLiked = localStorage.getItem(`liked_${id}`) !== null;
            try {
                const styleRef = doc(db, "styles", id);
                if (isLiked) {
                    await updateDoc(styleRef, { likes: increment(-1) });
                    localStorage.removeItem(`liked_${id}`);
                    updateLikeButtonsUI(id, false, -1);
                } else {
                    await updateDoc(styleRef, { likes: increment(1) });
                    localStorage.setItem(`liked_${id}`, 'true');
                    updateLikeButtonsUI(id, true, 1);
                }
            } catch (err) {
                console.error(err);
            } finally {
                btn.disabled = false;
            }
        }

        function updateLikeButtonsUI(id, isLikedState, valueChange) {
            const targetIdx = allStyles.findIndex(item => item.id === id);
            if(targetIdx !== -1) {
                allStyles[targetIdx].likes = (allStyles[targetIdx].likes || 0) + valueChange;
            }
            const selector = `button[data-id="${id}"]`;
            const buttons = document.querySelectorAll(selector);
            buttons.forEach(button => {
                if(isLikedState) {
                    button.classList.add('liked');
                } else {
                    button.classList.remove('liked');
                }
                const countSpan = button.querySelector('.like-count');
                if(countSpan) {
                    countSpan.innerText = parseInt(countSpan.innerText) + valueChange;
                }
            });
        }

        document.getElementById('searchInput').addEventListener('input', (e) => {
            const searchKey = e.target.value.trim().toLowerCase();
            const filtered = allStyles.filter(item => (item.name||'').toLowerCase().includes(searchKey)||(item.prompt||'').toLowerCase().includes(searchKey)||(item.category||'').toLowerCase().includes(searchKey));
            renderGallery(filtered);
        });

        document.getElementById('searchInput').addEventListener('keydown',(e)=>{if(e.key==='Enter'){const q=e.target.value.trim();if(q)window.location.href='results.html?q='+encodeURIComponent(q);}});

        window.filterCategory = function(category) {
            document.querySelectorAll('.cat-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            if(category === 'All') { renderGallery(allStyles); } 
            else { renderGallery(allStyles.filter(item => item.category === category)); }
        }

        fetchStyles();
    </script>
    <script>
        if ("serviceWorker" in navigator) {
            window.addEventListener("load", () => {
                navigator.serviceWorker.register("./service-worker.js");
            });
        }
    </script>
</body>
</html>
