<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Results</title>
    <style>
        body { font-family: Arial; background: #f5f5f5; margin: 0 }
        header { padding: 15px; background: #fff; position: sticky; top: 0 }
        input { width: 100%; max-width: 500px; padding: 12px; border-radius: 30px; border: 1px solid #ccc }
        .grid { columns: 2; column-gap: 12px; padding: 12px }
        .card { break-inside: avoid; background: #fff; border-radius: 12px; margin-bottom: 12px; overflow: hidden }
        img { width: 100%; display: block; cursor: pointer; }
        .info { padding: 10px }
        .like { cursor: pointer; display: flex; align-items: center; gap: 5px; border: none; background: none; }
        @media(min-width: 800px) { .grid { columns: 4 } }
    </style>
</head>
<body>

<header><input id="s" placeholder="Search..."></header>
<div class="grid" id="g"></div>

<script type="module">
    import {initializeApp} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import {getFirestore,collection,getDocs,doc,updateDoc,increment} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    
    const firebaseConfig={apiKey:"AIzaSyBJgk2EzELMAeW0dhw2hyTIxtp6f7Tbo8M",authDomain:"thivash-32c14.firebaseapp.com",projectId:"thivash-32c14",storageBucket:"thivash-32c14.firebasestorage.app",messagingSenderId:"842996953973",appId:"1:842996953973:web:1ebeebc76aa8a2a4ab993c"};
    const db=getFirestore(initializeApp(firebaseConfig));
    const q=new URLSearchParams(location.search).get("q")||"";
    const s = document.getElementById("s");
    const g = document.getElementById("g");
    
    s.value=q;

    const fullHeart = `<svg width="20" height="20" viewBox="0 0 24 24" fill="red"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>`;
    const emptyHeart = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>`;

    let arr=[];
    const snap=await getDocs(collection(db,"styles"));
    snap.forEach(d=>arr.push({id:d.id,...d.data()}));

    function draw(list){
        g.innerHTML="";
        if(!list.length){g.innerHTML="<h3>No Results</h3>";return;}
        list.forEach(it=>{
            let liked=localStorage.getItem("liked_"+it.id);
            g.innerHTML+=`<div class="card"><img loading="lazy" src="${it.image}" onclick="location.href='detail.html?id=${it.id}'"><div class="info"><b>${it.name}</b><br><button class="like" onclick="like('${it.id}',this)">${liked?fullHeart:emptyHeart} <span>${it.likes||0}</span></button></div></div>`
        })
    }

    window.like=async(id,b)=>{
        let l=localStorage.getItem("liked_"+id);
        await updateDoc(doc(db,"styles",id),{likes:increment(l?-1:1)});
        let sp=b.querySelector("span");
        sp.textContent=+sp.textContent+(l?-1:1);
        
        if(l){
            localStorage.removeItem("liked_"+id);
            b.querySelector("svg").outerHTML = emptyHeart;
        } else {
            localStorage.setItem("liked_"+id,"1");
            b.querySelector("svg").outerHTML = fullHeart;
        }
    }

    function filt(v){
        v=v.toLowerCase();
        draw(arr.filter(i=>(i.name||"").toLowerCase().includes(v)||(i.prompt||"").toLowerCase().includes(v)||(i.category||"").toLowerCase().includes(v)));
    }
    
    filt(q);
    s.oninput=e=>filt(e.target.value);
    s.onkeydown=e=>{if(e.key==="Enter")location.href="results.html?q="+encodeURIComponent(s.value)};
</script>
</body>
</html>
